<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест кнопки смены пароля</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap">
</head>
<body>
    <h1>Тест кнопки смены пароля</h1>
    
    <!-- Кнопка для тестирования -->
    <button class="btn-pill btn-pill--secondary" id="change-password-btn" style="width: 100%">
        <span class="material-symbols-outlined">vpn_key</span> Сменить пароль
    </button>

    <!-- Change Password Modal -->
    <div class="modal-backdrop" id="change-password-modal">
        <div class="modal-box" style="max-width: 420px">
            <div class="modal-header">
                <h3 style="color: var(--text); text-align: center; margin-bottom: 1rem">
                    <span class="material-symbols-outlined" style="vertical-align: middle; margin-right: 8px; color: var(--primary);">vpn_key</span>
                    Смена пароля
                </h3>
                <button class="modal-close" id="change-password-modal-close">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <form id="change-password-form">
                <div class="form-group">
                    <label style="color: var(--text); font-weight: 600">Текущий пароль</label>
                    <div class="input-with-icon">
                        <span class="material-symbols-outlined input-icon">lock</span>
                        <input type="password" id="current-password" class="form-control" placeholder="Введите текущий пароль" required />
                    </div>
                </div>
                <div class="form-group">
                    <label style="color: var(--text); font-weight: 600">Новый пароль</label>
                    <div class="input-with-icon">
                        <span class="material-symbols-outlined input-icon">lock</span>
                        <input type="password" id="new-password" class="form-control" placeholder="Минимум 6 символов" required minlength="6" />
                    </div>
                </div>
                <div class="form-group">
                    <label style="color: var(--text); font-weight: 600">Подтвердите пароль</label>
                    <div class="input-with-icon">
                        <span class="material-symbols-outlined input-icon">lock</span>
                        <input type="password" id="confirm-new-password" class="form-control" placeholder="Повторите новый пароль" required minlength="6" />
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="submit" class="btn-pill btn-pill--primary" style="flex: 1">
                        <span class="material-symbols-outlined">save</span> Сменить пароль
                    </button>
                    <button type="button" class="btn-pill btn-pill--secondary" style="flex: 1" id="change-password-cancel">
                        <span class="material-symbols-outlined">close</span> Отмена
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Имитируем основные функции для теста
        function toast(message, type) {
            console.log('Toast:', message, type);
            alert(message);
        }

        // Загружаем наш исправленный код
        // ===== СМЕНА ПАРОЛЯ =====
        // Используем делегирование событий, так как кнопка может быть в скрытом контейнере
        document.addEventListener('click', (e) => {
            const changePasswordBtn = e.target.closest('#change-password-btn');
            if (changePasswordBtn) {
                const changePasswordModal = document.getElementById('change-password-modal');
                if (changePasswordModal) {
                    changePasswordModal.classList.add('open');
                    document.body.classList.add('modal-open');
                    console.log('Модальное окно открыто');
                } else {
                    console.warn('❌ Модалка смены пароля не найдена');
                }
            }
        });

        // Обработчики закрытия модалки (выполняются при загрузке DOM)
        document.addEventListener('DOMContentLoaded', () => {
            // Обработчики закрытия модалки
            const closeModalBtns = [
                document.getElementById('change-password-modal-close'),
                document.getElementById('change-password-cancel'),
            ];
            closeModalBtns.forEach(btn => {
                if (btn) {
                    btn.addEventListener('click', () => {
                        const modal = document.getElementById('change-password-modal');
                        modal?.classList.remove('open');
                        document.body.classList.remove('modal-open');
                        console.log('Модальное окно закрыто');
                    });
                }
            });

            // Закрытие по клику на фон
            const changePasswordModal = document.getElementById('change-password-modal');
            if (changePasswordModal) {
                changePasswordModal.addEventListener('click', e => {
                    if (e.target === changePasswordModal) {
                        changePasswordModal.classList.remove('open');
                        document.body.classList.remove('modal-open');
                        console.log('Модальное окно закрыто по клику на фон');
                    }
                });
            }
        });

        // Обработка формы смены пароля
        document.getElementById('change-password-form')?.addEventListener('submit', async e => {
            e.preventDefault();
            console.log('Форма отправлена');
            toast('Форма работает корректно!', 'success');
        });
    </script>
</body>
</html>
